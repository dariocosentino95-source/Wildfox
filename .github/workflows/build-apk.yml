name: Build Briscola APK

on:
  push:
    branches: [ "claude/briscola-scoring-app-msfg6j", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: briscola-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: briscola-app
        run: npm install

      - name: Build React app
        working-directory: briscola-app
        run: npm run build

      - name: Sync Capacitor
        working-directory: briscola-app
        run: npx cap sync android

      - name: Build APK
        working-directory: briscola-app/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Briscola-APK
          path: briscola-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
