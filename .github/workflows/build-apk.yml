name: Build Android APK

on:
  push:
    branches:
      - claude/3d-capture-app-editor-edQGo
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Wildfox 3D APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform + build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses 2>/dev/null || true
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "NDK disponibili:"
          ls "$ANDROID_SDK_ROOT/ndk" 2>/dev/null || echo "nessuna cartella ndk"

      - name: Install npm dependencies
        run: npm ci

      - name: Patch expo-modules-core for AGP 8.x compatibility
        run: |
          python3 - <<'PYEOF'
import sys
path = "node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle"
with open(path, "r") as f:
    content = f.read()

# Remove the entire afterEvaluate maven publishing block.
# It fails with AGP 8.x (MissingPropertyException: 'release' component not yet created).
# Maven publishing is not needed to build an APK — only for library distribution.
old = """  afterEvaluate {
    publishing {
      publications {
        release(MavenPublication) {
          from components.release
        }
      }
      repositories {
        maven {
          url = mavenLocal().url
        }
      }
    }
  }"""
new = "  // afterEvaluate publishing removed: not needed for APK build, fails on AGP 8.x"

if old in content:
    content = content.replace(old, new)
    with open(path, "w") as f:
        f.write(content)
    print("Patch applied: removed maven publishing block from useExpoPublishing")
else:
    print("ERROR: pattern not found — check indentation")
    print("File snippet around 'from components':")
    for i, line in enumerate(content.splitlines()):
        if "components" in line:
            start = max(0, i-3)
            end = min(len(content.splitlines()), i+4)
            for j, l in enumerate(content.splitlines()[start:end], start):
                print(f"  {j}: {repr(l)}")
            break
    sys.exit(1)
PYEOF

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          # Cerca il primo NDK installato e aggiungilo se presente
          NDK_DIR=$(ls -d "$ANDROID_SDK_ROOT/ndk/"* 2>/dev/null | head -1)
          if [ -n "$NDK_DIR" ]; then
            echo "ndk.dir=$NDK_DIR" >> android/local.properties
            echo "NDK trovato: $NDK_DIR"
          fi
          cat android/local.properties

      - name: Patch gradle.properties
        run: |
          echo "" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.configureondemand=true" >> android/gradle.properties

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_full.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== PRIMA ECCEZIONE ==="
            grep -m1 -A20 "Caused by\|Exception\|FAILURE" /tmp/gradle_full.log || true
            echo "=== ULTIME 50 RIGHE ==="
            tail -50 /tmp/gradle_full.log
            exit $EXIT_CODE
          fi

      - name: Show APK info
        if: success()
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
          echo "✅ APK: $APK ($(du -sh "$APK" | cut -f1))"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wildfox3d-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
